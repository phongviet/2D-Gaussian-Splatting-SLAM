Results:
  save_results: True
  save_dir: "results"
  save_trj: True
  save_trj_kf_intv: 10
  use_gui: True
  eval_rendering: True
  use_wandb: False

Dataset:
  type: 'tum'
  sensor_type: 'monocular'
  pcd_downsample: 64
  pcd_downsample_init: 32
  adaptive_pointsize: True
  point_size: 0.01

Training:
  init_itr_num: 1050
  init_gaussian_update: 100
  init_gaussian_reset: 500
  init_gaussian_th: 0.005
  init_gaussian_extent: 30
  tracking_itr_num: 100
  mapping_itr_num: 150
  gaussian_update_every: 150
  gaussian_update_offset: 50
  gaussian_th: 0.7
  gaussian_extent: 1.0
  gaussian_reset: 2001
  size_threshold: 20
  kf_interval: 5
  window_size: 8
  pose_window: 3
  edge_threshold: 1.1
  rgb_boundary_threshold: 0.01
  lambda_normal: 0.05
  lambda_distortion: 0.001

  kf_translation: 0.08
  kf_min_translation: 0.05
  kf_overlap: 0.9
  kf_cutoff: 0.3
  init_kf_cutoff: 0.1
  prune_mode: 'slam'
  single_thread: False
  spherical_harmonics: False

  lr:
    cam_rot_delta: 0.003
    cam_trans_delta: 0.001

opt_params:
  iterations: 30000
  position_lr_init: 0.0016
  position_lr_final: 0.0000016
  position_lr_delay_mult: 0.01
  position_lr_max_steps: 30000
  feature_lr: 0.0025
  opacity_lr: 0.05
  scaling_lr: 0.001
  rotation_lr: 0.001
  percent_dense: 0.01
  lambda_dssim: 0.0
  densification_interval: 100
  opacity_reset_interval: 3000
  densify_from_iter: 500
  densify_until_iter: 15000
  densify_grad_threshold: 0.0002

model_params:
  sh_degree: 0
  source_path: ""
  model_path: ""
  resolution: -1
  white_background: False
  data_device: "cuda"

pipeline_params:
  convert_SHs_python: False
  compute_cov3D_python: False

# =============================================================================
# EXPERIMENTAL FEATURES
# All features are disabled by default (False/None). Toggle as needed.
# =============================================================================

  # -------------------------------------------------------------------------
  # Experiment: Densification-Only SLAM
  # Disables Gaussian insertion from new keyframes; relies on densification
  # to grow existing Gaussians. Useful for studying densification behavior.
  # -------------------------------------------------------------------------
  densification_exp:
    enabled: False             # Master toggle for this experiment group
    insert_gaussians: True   # If False, skip extend_from_pcd_seq on new KFs
    densify_every_frame: False # If True, run densify_and_prune every map() call
    gradient_threshold: 0.0002 # Overrides opt_params.densify_grad_threshold when set
    clone_only: False          # Run only densify_and_clone (no splitting)
    split_only: False          # Run only densify_and_split  (no cloning)
    max_densify_per_step: 0   # Cap new Gaussians per densify call (0 = no cap)
    max_total_gaussians: 0   # Hard cap on total Gaussian count (0 = no cap)

  # -------------------------------------------------------------------------
  # Experiment: Adaptive Densification Budget (Mini-Splatting-inspired)
  # Prevents runaway Gaussian count growth by capping densification.
  # -------------------------------------------------------------------------
  densification_budget:
    enabled: False
    max_gaussians: 100000     # Target max Gaussian count
    prune_aggressively: False # If True, prune excess beyond max immediately

  # -------------------------------------------------------------------------
  # Experiment: Early Opacity Pruning
  # More aggressive pruning of low-opacity Gaussians early in optimization.
  # -------------------------------------------------------------------------
  early_pruning:
    enabled: False
    opacity_threshold_init: 0.005  # Tighter threshold at start
    opacity_threshold_final: 0.7    # Anneal to this value
    anneal_iters: 5000             # Iterations over which to anneal

  # -------------------------------------------------------------------------
  # Experiment: Progressive Resolution Scheduling (DashGaussian-inspired)
  # Train at lower resolution early, ramp to full resolution.
  # Reduces per-iteration cost in early optimization.
  # -------------------------------------------------------------------------
  resolution_schedule:
    enabled: False
    start_factor: 0.5      # Start at this fraction of full resolution (e.g. 0.5 = 50%)
    ramp_up_iters: 500      # Linearly ramp from start_factor to 1.0 over N iters

  # -------------------------------------------------------------------------
  # Experiment: Sparse Adam Optimizer (Taming-3DGS-inspired)
  # Use SparseAdam: only updates Gaussians that contributed to rendering.
  # Can reduce optimizer overhead when most Gaussians are inactive.
  # -------------------------------------------------------------------------
  sparse_adam:
    enabled: True
    visible_only: True      # Only update Gaussians that passed visibility filter
